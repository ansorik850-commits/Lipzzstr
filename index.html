<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AETHER Payment</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
background:linear-gradient(to bottom,#2d2d2d,#111);
color:#fff;
min-height:100vh;
}

.container{
max-width:430px;
margin:auto;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:flex-end;
gap:12px;
margin-top:10px;
margin-bottom:35px;
}

.icon{
width:58px;
height:58px;
background:#fff;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:#222;
position:relative;
box-shadow:0 10px 20px rgba(0,0,0,.25);
transition:.25s;
cursor:pointer;
}

.icon:active{
transform:scale(.95);
}

.badge{
position:absolute;
top:6px;
right:6px;
width:18px;
height:18px;
background:#ff3b3b;
color:#fff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:10px;
}

/* PROFILE */

.profile{
text-align:center;
}

.avatar{
width:135px;
height:135px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:5px solid #ddd;
position:relative;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.verify{
position:absolute;
bottom:5px;
right:5px;
width:34px;
height:34px;
border-radius:50%;
background:#2d7dff;
display:flex;
justify-content:center;
align-items:center;
border:3px solid white;
}

.verify i{
color:#fff;
font-size:13px;
}

.name{
margin-top:18px;
font-size:42px;
font-weight:700;
}

.username{
margin-top:6px;
font-size:20px;
color:#d7d7d7;
}

.desc{
margin-top:20px;
font-size:18px;
line-height:1.6;
color:#bfbfbf;
padding:0 15px;
}

/* PAYMENT */

.payment{
margin-top:40px;
display:flex;
flex-direction:column;
gap:15px;
}

.pay-btn{
height:78px;
background:#fff;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
font-size:26px;
font-weight:600;
color:#222;
cursor:pointer;
transition:.25s;
box-shadow:0 12px 20px rgba(0,0,0,.2);
}

.pay-btn:active{
transform:scale(.96);
}

.pay-btn i{
font-size:28px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="icon">
<i class="fa-regular fa-bell"></i>
<div class="badge">3</div>
</div>

<div class="icon">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<div class="profile">

<div class="avatar">

<img src="https://picsum.photos/300" id="profile">

<div class="verify">
<i class="fa-solid fa-check"></i>
</div>

</div>

<h1 class="name">LIPZZ</h1>

<div class="username">@LIPZZ_id</div>

<div class="desc">
Pilih metode pembayaran yang tersedia di bawah ini.<br>
Aman • Cepat • Terpercaya
</div>

</div>

<div class="payment">

<div class="pay-btn">
<i class="fa-solid fa-qrcode"></i>
QRIS
</div>

<div class="pay-btn">
<i class="fa-solid fa-wallet"></i>
E-Wallet
</div>

<div class="pay-btn">
<i class="fa-solid fa-building-columns"></i>
Bank
</div>

<div class="pay-btn">
<i class="fa-solid fa-mobile-screen"></i>
Pulsa
</div>

</div>
<!-- POPUP -->

<div id="popup" class="popup">

<div class="popup-box">

<span class="close" onclick="closePopup()">&times;</span>

<div id="popupContent"></div>

</div>

</div>

<style>

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
backdrop-filter:blur(6px);
}

.popup-box{
width:100%;
max-width:370px;
background:#1b1b1b;
border-radius:22px;
padding:25px;
color:#fff;
position:relative;
animation:popup .25s ease;
}

@keyframes popup{
from{
transform:scale(.9);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
position:absolute;
top:12px;
right:18px;
font-size:30px;
cursor:pointer;
}

.popup-box img{
width:100%;
border-radius:14px;
margin:15px 0;
}

.popup-box h2{
text-align:center;
margin-bottom:15px;
}

.popup-box p{
margin:10px 0;
text-align:center;
font-size:17px;
}

.copy-btn{
width:100%;
height:50px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2d7dff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.toast{
position:fixed;
left:50%;
bottom:25px;
transform:translateX(-50%);
background:#1f1f1f;
color:#fff;
padding:12px 18px;
border-radius:12px;
font-size:15px;
opacity:0;
transition:.3s;
z-index:9999;
}

</style>

<script>

const popup=document.getElementById("popup");
const popupContent=document.getElementById("popupContent");

function openPopup(html){
popupContent.innerHTML=html;
popup.style.display="flex";
}

function closePopup(){
popup.style.display="none";
}

function copyText(text){

navigator.clipboard.writeText(text);

let toast=document.createElement("div");

toast.className="toast";

toast.innerHTML="✓ Berhasil disalin";

document.body.appendChild(toast);

setTimeout(()=>{
toast.style.opacity="1";
},20);

setTimeout(()=>{
toast.style.opacity="0";

setTimeout(()=>{
toast.remove();
},300);

},1800);

}

const btn=document.querySelectorAll(".pay-btn");

btn[0].onclick=()=>{

openPopup(`

<h2>QRIS</h2>

<img src="https://picsum.photos/500" alt="QRIS">

<p>Scan QRIS di atas.</p>

`);

}

btn[1].onclick=()=>{

openPopup(`

<h2>E-Wallet</h2>

<p>DANA : 08123456789</p>

<p>GoPay : 08123456789</p>

<p>OVO : 08123456789</p>

<button class="copy-btn" onclick="copyText('08123456789')">Copy Nomor</button>

`);

}

btn[2].onclick=()=>{

openPopup(`

<h2>Bank</h2>

<p>BCA : 1234567890</p>

<p>BRI : 1234567890</p>

<button class="copy-btn" onclick="copyText('1234567890')">Copy Rekening</button>

`);

}

btn[3].onclick=()=>{

openPopup(`

<h2>Pulsa</h2>

<p>Telkomsel : 08123456789</p>

<p>XL : 08123456789</p>

<button class="copy-btn" onclick="copyText('08123456789')">Copy Nomor</button>

`);

}

popup.addEventListener("click",e=>{
if(e.target===popup){
closePopup();
}
});

</script>
<script>

// Efek klik tombol payment
document.querySelectorAll(".pay-btn").forEach(btn=>{

btn.addEventListener("mousedown",()=>{

btn.style.transform="scale(.96)";

});

btn.addEventListener("mouseup",()=>{

btn.style.transform="scale(1)";

});

btn.addEventListener("mouseleave",()=>{

btn.style.transform="scale(1)";

});

});

// Efek icon header
document.querySelectorAll(".icon").forEach(icon=>{

icon.addEventListener("mouseenter",()=>{

icon.style.transform="rotate(8deg)";

});

icon.addEventListener("mouseleave",()=>{

icon.style.transform="rotate(0deg)";

});

});

// Loading halus
window.addEventListener("load",()=>{

document.body.style.opacity="0";

document.body.style.transition="opacity .45s";

setTimeout(()=>{

document.body.style.opacity="1";

},80);

});

</script>

<footer style="

margin-top:45px;
padding:25px 15px;

text-align:center;

color:#9a9a9a;

font-size:14px;

">

<b style="color:#fff;">LIPZZ PAYMENT</b>

<br><br>

© 2026 All Rights Reserved

</footer>

</div>

</body>
</html>
